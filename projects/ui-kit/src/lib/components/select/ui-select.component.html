<div class="ui-select-field">
  <ui-label
    [label]="label()"
    [forId]="id()"
    [required]="hasRequired()"
    [showOptionalText]="showOptionalText()"
  ></ui-label>

  <select
    [id]="id()"
    [name]="name()"
    [class]="classes()"
    [value]="value()"
    [required]="hasRequired()"
    [disabled]="disabled() || disabledState()"
    [attr.aria-invalid]="hasError()"
    [attr.aria-describedby]="hasError() ? id() + '-error' : null"
    (change)="handleChange($event)"
    (blur)="handleBlur()"
  >
    <option value="" disabled>
      {{ placeholder() }}
    </option>

    @for (option of options(); track option.value) {
      <option [value]="option.value" [disabled]="option.disabled">
        {{ option.label }}
      </option>
    }
  </select>

  @if (hasError()) {
    <p class="ui-select-field__error" [id]="id() + '-error'">
      {{ errorMessage() }}
    </p>
  }
</div>
